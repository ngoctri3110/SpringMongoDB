spring:
  application:
    name: ecommerce-platform
  data:
    mongodb:
      uri: mongodb://admin:admin123@localhost:27017/ecommerce?authSource=admin
      auto-index-creation: true

  jpa:
    show-sql: false

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 1
    consumer:
      bootstrap-servers: localhost:9092
      group-id: ecommerce-consumer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.ecommerce.event"
      auto-offset-reset: earliest
      enable-auto-commit: true

# Database seeding configuration
seed:
  database:
    init: true  # Set to false to disable automatic database seeding

jpa:
    show-sql: false

logging:
  level:
    root: INFO
    org.springframework.data.mongodb: DEBUG
    com.example.ecommerce: DEBUG

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
